<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examination Results Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
  font-family:'Inter',sans-serif;
  background:#f4f6f8;
  margin:0;
}

/* MAIN CARD */
.container{
  width:95%;
  max-width:480px;
  margin:30px auto;
  padding:22px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.logo{
  width:110px;
  display:block;
  margin:0 auto 10px;
}

h2{
  margin:2px 0;
  text-align:center;
  color:#222;
}

.subtitle{
  text-align:center;
  color:#0f7a41;
  font-style:italic;
  font-size:14px;
  margin-bottom:15px;
}

label{
  display:block;
  margin-top:14px;
  font-weight:600;
  font-size:14px;
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  font-size:16px;
  border:1px solid #bbb;
  border-radius:6px;
}

input:focus{
  outline:none;
  border-color:#0f7a41;
  box-shadow:0 0 0 2px rgba(15,122,65,0.15);
}

button{
  width:100%;
  padding:13px;
  margin-top:22px;
  background:#0f7a41;
  color:#fff;
  font-size:16px;
  font-weight:600;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{ background:#0d6a38; }

.results{
  display:none;
  margin-top:20px;
}

.student-info{
  text-align:center;
  font-weight:600;
  color:#0f7a41;
  margin-bottom:10px;
  font-size:16px;
}

.iframe-wrapper{
  width:100%;
  height:70vh;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  background:#fff;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

footer{
  text-align:center;
  margin:25px 0;
  color:#777;
  font-size:13px;
}

/* ===== LOADING SPINNER ===== */
.spinner-overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid #e5e7eb;
  border-top:6px solid #0f7a41;
  border-radius:50%;
  animation:spin 0.9s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* ===== DEVICE ADAPTIVITY ===== */

/* Small phones */
@media (max-width:360px){
  .container{ margin:18px 10px; padding:16px; }
  h2{ font-size:16px; }
  .subtitle{ font-size:12px; }
  input,button{ font-size:14px; padding:10px; }
  .iframe-wrapper{ height:60vh; }
}

/* Normal phones */
@media (min-width:361px) and (max-width:600px){
  .container{ margin:22px 14px; padding:18px; }
  h2{ font-size:18px; }
  .iframe-wrapper{ height:65vh; }
}

/* Tablets */
@media (min-width:601px) and (max-width:900px){
  .container{ max-width:520px; padding:24px; }
  h2{ font-size:22px; }
  .iframe-wrapper{ height:72vh; }
}

/* Laptops & desktops */
@media (min-width:901px){
  .container{ max-width:640px; padding:28px; }
  h2{ font-size:24px; }
  .iframe-wrapper{ height:78vh; }
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="School Logo">

  <h2>Blantyre Secondary School</h2>
  <h2>Examination Results Portal</h2>
  <div class="subtitle">"Success Comes Through Discipline"</div>

  <form id="resultForm">
    <label for="examNo">Examination Number</label>
    <input type="text" id="examNo" required placeholder="Enter your examination number">

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" required>

    <button type="submit">View Report</button>
  </form>

  <div class="results" id="resultsDiv">
    <div class="student-info" id="studentInfo"></div>
    <div class="iframe-wrapper">
      <iframe id="reportFrame"></iframe>
    </div>
  </div>
</div>

<div class="spinner-overlay" id="spinner">
  <div class="spinner"></div>
</div>

<footer>© 2026 – Blantyre Secondary School</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbywTjrpa9ybkneTIgLWQl-nE980E58h3qhtmnyS376QCB-Jpu33bv45JiAWDaKWh1ry/exec";

const form = document.getElementById("resultForm");
const resultsDiv = document.getElementById("resultsDiv");
const studentInfo = document.getElementById("studentInfo");
const reportFrame = document.getElementById("reportFrame");
const spinner = document.getElementById("spinner");

function showSpinner(){ spinner.style.display="flex"; }
function hideSpinner(){ spinner.style.display="none"; }

form.addEventListener("submit", async function(e){
  e.preventDefault();
  showSpinner();

  const examNo = examNo.value.trim();
  const dobInput = dob.value;
  const formattedDob = new Date(dobInput).toISOString().split("T")[0];

  try{
    const res = await fetch(`${API_URL}?examNo=${examNo}&dob=${formattedDob}`);
    const data = await res.json();

    if(!data.success){
      hideSpinner();
      alert("No report found for the entered details.");
      return;
    }

    studentInfo.textContent = "Examination Report – " + examNo;
    reportFrame.src = `https://drive.google.com/file/d/${data.fileId}/preview`;

    form.style.display="none";
    resultsDiv.style.display="block";

    reportFrame.onload = hideSpinner;

  }catch(err){
    hideSpinner();
    alert("Something went wrong.");
  }
});
</script>

</body>
</html>
